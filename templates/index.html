<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 60%;
            margin: auto;
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        a {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>🧠 Fake News Detection Platform</h1>

    <div class="container">

        <textarea id="newsText" placeholder="Paste news here..."></textarea><br>

        <button onclick="checkNews()">Check News</button>

        <div id="result"></div>

    </div>

    <script>
    function checkNews() {
        let text = document.getElementById("newsText").value;

        let resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "Checking... ⏳";

        fetch('https://fake-news-detector-waqm.onrender.com/predict', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ text: text })
        })
        .then(response => response.json())
        .then(data => {

            let sourceHTML = "";

            if (data.sources && data.sources.length > 0) {
                sourceHTML = "<br><br><b>Sources:</b><br>";

                data.sources.forEach((src, index) => {
                    sourceHTML += `<a href="${src}" target="_blank">${index + 1}. Open Article</a><br>`;
                });
            }

            resultDiv.innerHTML =
                `Prediction: ${data.prediction}${sourceHTML}`;

            if (data.prediction === "Real") {
                resultDiv.style.color = "green";
            } else {
                resultDiv.style.color = "red";
            }
        })
        .catch(error => {
            console.log(error);
            resultDiv.innerText = "Error connecting to server";
        });
    }
    </script>

</body>
</html>
